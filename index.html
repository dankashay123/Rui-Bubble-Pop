<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bubble Smash">
<meta name="mobile-web-app-capable" content="yes">
<title>Bubble Smash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none; pointer-events: none;
  }
  html, body { width:100%; height:100%; overflow:hidden; position:fixed; top:0; left:0; }
  body { background:#03001c; touch-action:none; overscroll-behavior:none; }

  /* ── Deep space background ── */
  #bg {
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(72,0,120,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 70%, rgba(0,60,140,0.45) 0%, transparent 65%),
      radial-gradient(ellipse 50% 40% at 55% 15%, rgba(120,0,80,0.3) 0%, transparent 60%),
      linear-gradient(170deg, #03001c 0%, #06003a 40%, #03001a 100%);
    background-size: 200% 200%;
    animation: nebulaShift 18s ease-in-out infinite alternate;
  }
  @keyframes nebulaShift {
    0%   { background-position: 0% 0%; }
    100% { background-position: 100% 100%; }
  }

  #stars { position:fixed; inset:0; z-index:1; pointer-events:none; }

  /* ── Header ── */
  #header {
    position:fixed; top:0; left:0; right:0; z-index:100; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
    padding: calc(env(safe-area-inset-top,0px) + 8px) 20px 10px;
  }
  #score-badge {
    display:flex; align-items:center; gap:6px;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius:999px;
    padding: 8px 28px 8px 18px;
    white-space: nowrap;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(180,120,255,0.15),
      0 4px 24px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.12);
  }
  #score-icon { font-size: clamp(18px,5vw,26px); line-height:1; }
  #score-label {
    font-family:'Fredoka One',cursive;
    font-size: clamp(13px,3.4vw,20px);
    color: rgba(200,180,255,0.75);
    letter-spacing:0.02em; line-height:1;
  }
  #score-number {
    font-family:'Fredoka One',cursive;
    font-size: clamp(24px,7vw,40px);
    color: #fff;
    text-shadow: 0 0 20px rgba(180,140,255,0.9), 0 0 40px rgba(140,100,255,0.5);
    line-height:1; min-width:2ch; display:inline-block;
  }
  #score-number.bump { animation: scoreBump 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes scoreBump {
    0%   { transform:scale(1) rotate(0deg); }
    35%  { transform:scale(1.6) rotate(-10deg); }
    65%  { transform:scale(0.88) rotate(5deg); }
    100% { transform:scale(1) rotate(0deg); }
  }

  /* ── Stage ── */
  #stage { position:fixed; inset:0; z-index:2; pointer-events:none; touch-action:none; }

  /* ── Glass Bubbles ── */
  .bubble {
    position:absolute; border-radius:50%;
    pointer-events:all; cursor:pointer;
    z-index:10; will-change:transform,opacity;
    overflow:hidden;
  }
  /* Primary highlight — large soft blob */
  .bubble::before {
    content:''; position:absolute;
    top:8%; left:14%; width:38%; height:28%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 100%);
    border-radius:50%; transform:rotate(-35deg);
    pointer-events:none;
  }
  /* Secondary highlight — small bright dot */
  .bubble::after {
    content:''; position:absolute;
    top:16%; left:58%; width:14%; height:11%;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 100%);
    border-radius:50%; pointer-events:none;
  }
  @keyframes bubbleSpawn {
    0%   { transform:scale(0) rotate(-15deg); opacity:0; }
    55%  { transform:scale(1.18) rotate(6deg); opacity:1; }
    80%  { transform:scale(0.93); opacity:1; }
    100% { transform:scale(1); opacity:1; }
  }
  @keyframes bubblePop {
    0%   { transform:scale(1); opacity:1; filter:brightness(1); }
    30%  { transform:scale(1.5); opacity:0.9; filter:brightness(1.8); }
    100% { transform:scale(0); opacity:0; filter:brightness(2); }
  }

  /* ── Word Labels — glow style ── */
  .word-label {
    position:absolute;
    font-family:'Fredoka One',cursive;
    font-size: clamp(30px,9vw,58px);
    pointer-events:none; z-index:20;
    white-space:nowrap; will-change:transform,opacity;
    letter-spacing:0.03em;
  }
  @keyframes wordPop {
    0%   { transform:translate(-50%,-50%) scale(0) rotate(var(--tilt)); opacity:0; }
    50%  { transform:translate(-50%,-50%) scale(1.25) rotate(var(--tilt)); opacity:1; }
    75%  { transform:translate(-50%,-50%) scale(0.92) rotate(var(--tilt)); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(1) rotate(var(--tilt)); opacity:1; }
  }
  @keyframes wordFade {
    0%   { opacity:1; transform:translate(-50%,-60%) scale(1) rotate(var(--tilt)); }
    100% { opacity:0; transform:translate(-50%,-100%) scale(0.85) rotate(var(--tilt)); }
  }

  /* ── Emoji Particles ── */
  .emoji-particle {
    position:absolute; font-size:clamp(22px,6.5vw,44px);
    pointer-events:none; z-index:35;
    will-change:transform,opacity; line-height:1;
    transform:translate(-50%,-50%);
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
  }
  @keyframes particleBurst {
    0%   { opacity:1; transform:translate(-50%,-50%) scale(0.3) rotate(0deg); }
    100% { opacity:1; transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.2) rotate(var(--rot-half)); }
  }
  @keyframes particleFade {
    0%   { opacity:1; transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.2) rotate(var(--rot-half)); }
    55%  { opacity:0.9; transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy) - 22px)) scale(1.05) rotate(var(--rot-half)); }
    100% { opacity:0; transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy) - 38px)) scale(0.4) rotate(var(--rot)); }
  }

  /* ── Rui Crown ── */
  .rui-crown {
    position:absolute; font-size:1.15em; top:-0.95em; left:50%;
    transform:translateX(-50%); pointer-events:none;
    animation:crownBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    filter:drop-shadow(0 0 8px rgba(255,215,0,0.8));
  }
  @keyframes crownBounce {
    0%   { transform:translateX(-50%) translateY(14px) scale(0); opacity:0; }
    100% { transform:translateX(-50%) translateY(0) scale(1); opacity:1; }
  }

  /* ── Color Echo ── */
  #color-echo {
    position:fixed; inset:0; z-index:3;
    pointer-events:none; opacity:0; mix-blend-mode:screen;
  }
  @keyframes colorEcho {
    0%   { opacity:0.45; }
    100% { opacity:0; }
  }

  /* ── Peeking Animals ── */
  .peek-animal {
    position:fixed; font-size:clamp(80px,22vw,130px);
    line-height:1; pointer-events:none; z-index:50;
    will-change:transform;
    filter:drop-shadow(0 8px 24px rgba(0,0,0,0.3)) drop-shadow(0 0 12px rgba(255,255,255,0.15));
  }
  @keyframes peekBottom {
    0%   { transform:translateY(100%) scale(0.7); }
    18%  { transform:translateY(10%) scale(1.1); }
    25%  { transform:translateY(16%) scale(1.0); }
    75%  { transform:translateY(16%) scale(1.0); }
    100% { transform:translateY(105%) scale(0.8); }
  }
  @keyframes peekLeft {
    0%   { transform:translateX(-100%) scale(0.7); }
    18%  { transform:translateX(-6%) scale(1.1); }
    25%  { transform:translateX(-12%) scale(1.0); }
    75%  { transform:translateX(-12%) scale(1.0); }
    100% { transform:translateX(-105%) scale(0.8); }
  }
  @keyframes peekRight {
    0%   { transform:translateX(100%) scale(0.7); }
    18%  { transform:translateX(6%) scale(1.1); }
    25%  { transform:translateX(12%) scale(1.0); }
    75%  { transform:translateX(12%) scale(1.0); }
    100% { transform:translateX(105%) scale(0.8); }
  }

  /* ── Confetti ── */
  .confetti {
    position:fixed; pointer-events:none; z-index:200;
    border-radius:3px; will-change:transform,opacity;
  }
  @keyframes confettiFall {
    0%   { transform:translateY(var(--start-y)) translateX(0) rotate(0deg) scale(1); opacity:1; }
    80%  { opacity:1; }
    100% { transform:translateY(var(--end-y)) translateX(var(--drift)) rotate(var(--spin)) scale(0.6); opacity:0; }
  }

  /* ── Milestone ── */
  #milestone-flash {
    position:fixed; inset:0; z-index:190; pointer-events:none; opacity:0;
  }
  @keyframes milestoneFlash {
    0%   { opacity:0; }
    12%  { opacity:1; }
    100% { opacity:0; }
  }
  .milestone-label {
    position:fixed; left:50%; top:44%;
    transform:translate(-50%,-50%) scale(0);
    font-family:'Fredoka One',cursive;
    font-size:clamp(60px,20vw,110px);
    color:#fff; pointer-events:none; z-index:210;
    text-align:center; line-height:1.1;
    will-change:transform,opacity;
  }
  @keyframes milestonePop {
    0%   { transform:translate(-50%,-50%) scale(0); opacity:0; }
    25%  { transform:translate(-50%,-50%) scale(1.3); opacity:1; }
    55%  { transform:translate(-50%,-50%) scale(0.92); opacity:1; }
    75%  { transform:translate(-50%,-50%) scale(1.06); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(1); opacity:0; }
  }

  /* ── Rainbow Trail ── */
  .trail-dot {
    position:fixed; border-radius:50%; pointer-events:none;
    z-index:5; will-change:transform,opacity;
    filter:blur(1px);
  }
  @keyframes trailFade {
    0%   { opacity:0.9; transform:scale(1); }
    100% { opacity:0; transform:scale(0.15); }
  }

  /* ── Sleeping Moon ── */
  #moon {
    position:fixed; font-size:clamp(64px,18vw,110px);
    pointer-events:all; z-index:40; cursor:pointer;
    will-change:transform,opacity; line-height:1;
    filter:drop-shadow(0 0 22px rgba(255,240,120,0.75));
  }
  @keyframes moonDrift {
    0%   { transform:translateX(0) translateY(0) rotate(-5deg); }
    30%  { transform:translateX(16px) translateY(-9px) rotate(3deg); }
    60%  { transform:translateX(-11px) translateY(6px) rotate(-8deg); }
    100% { transform:translateX(0) translateY(0) rotate(-5deg); }
  }
  @keyframes moonAppear {
    0%   { opacity:0; transform:scale(0.4) rotate(-25deg); }
    100% { opacity:1; transform:scale(1) rotate(-5deg); }
  }
  @keyframes moonFlee {
    0%   { opacity:1; transform:scale(1); }
    100% { opacity:0; transform:scale(2.8) rotate(35deg); }
  }
  .moon-zzz {
    position:fixed; font-family:'Fredoka One',cursive;
    font-size:clamp(16px,4vw,26px); color:rgba(255,240,180,0.92);
    pointer-events:none; z-index:41;
    text-shadow:0 0 12px rgba(255,220,80,0.9); will-change:transform,opacity;
  }
  @keyframes zzzFloat {
    0%   { transform:translate(0,0) scale(0.5); opacity:0; }
    20%  { opacity:1; }
    100% { transform:translate(var(--zx),var(--zy)) scale(1.1); opacity:0; }
  }

  /* ── Clouds ── */
  .cloud {
    position:fixed; pointer-events:all; cursor:pointer;
    z-index:4; will-change:transform;
    filter:drop-shadow(0 6px 20px rgba(120,160,255,0.18));
  }
  .cloud-puff {
    position:fixed; pointer-events:none; z-index:5;
    border-radius:50%; filter:blur(8px);
    background:rgba(210,230,255,0.65); will-change:transform,opacity;
  }
  @keyframes cloudPuffOut {
    0%   { transform:scale(0.3) translate(var(--px),var(--py)); opacity:0.9; }
    55%  { opacity:0.55; }
    100% { transform:scale(2) translate(var(--px),var(--py)); opacity:0; }
  }

  /* ── Hold Bubble ── */
  .hold-bubble {
    position:fixed; border-radius:50%; pointer-events:none;
    z-index:20; transform:translate(-50%,-50%); will-change:transform;
  }
  @keyframes holdPulse {
    0%,100% { box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 0 0 20px currentColor; }
    50%     { box-shadow: inset 0 0 40px rgba(255,255,255,0.7), 0 0 40px currentColor; }
  }

  /* ── Rui Star Name ── */
  .rui-star-name {
    position:fixed; pointer-events:none; z-index:6;
    font-family:'Fredoka One',cursive;
    font-size:clamp(30px,9vw,58px);
    letter-spacing:0.2em; white-space:nowrap;
  }
  .rui-star-char { display:inline-block; position:relative; }
  @keyframes ruiStarAppear {
    0%   { opacity:0; transform:scale(0) rotate(-25deg) translateY(20px); }
    55%  { opacity:1; transform:scale(1.25) rotate(5deg) translateY(-4px); }
    100% { opacity:1; transform:scale(1) rotate(0deg) translateY(0); }
  }
  @keyframes ruiStarFade { 0% { opacity:1; } 100% { opacity:0; } }
  @keyframes ruiStarFloat {
    0%   { transform:translateY(0); }
    50%  { transform:translateY(-9px); }
    100% { transform:translateY(0); }
  }

  /* ── Shooting Stars ── */
  .shooting-star {
    position:fixed; pointer-events:none; z-index:55;
    will-change:transform,opacity; border-radius:50%;
  }
  @keyframes shootingStar {
    0%   { transform:translate(0,0); opacity:1; }
    82%  { opacity:1; }
    100% { transform:translate(var(--sx),var(--sy)); opacity:0; }
  }

  /* ── Light ray burst (milestone) ── */
  .light-ray {
    position:fixed; pointer-events:none; z-index:195;
    top:50%; left:50%; transform-origin:0 0;
    will-change:transform,opacity;
  }
  @keyframes rayBurst {
    0%   { transform:rotate(var(--ra)) scaleX(0); opacity:0.8; }
    40%  { transform:rotate(var(--ra)) scaleX(1); opacity:0.6; }
    100% { transform:rotate(var(--ra)) scaleX(1.2); opacity:0; }
  }

  /* ── Sparkle Trail on bubbles ── */
  .bubble-sparkle {
    position:absolute; pointer-events:none; z-index:12;
    border-radius:50%; will-change:transform,opacity;
  }
  @keyframes sparklePop {
    0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
    60%  { transform:translate(calc(-50% + var(--sx)),calc(-50% + var(--sy))) scale(1); opacity:0.9; }
    100% { transform:translate(calc(-50% + var(--sx)),calc(-50% + var(--sy))) scale(0); opacity:0; }
  }

  /* ── Combo burst ── */
  .combo-label {
    position:fixed; pointer-events:none; z-index:220;
    font-family:'Fredoka One',cursive;
    font-size:clamp(48px,15vw,88px);
    white-space:nowrap; line-height:1;
    will-change:transform,opacity;
  }
  @keyframes comboPop {
    0%   { transform:translate(-50%,-50%) scale(0) rotate(-12deg); opacity:0; }
    30%  { transform:translate(-50%,-50%) scale(1.35) rotate(4deg); opacity:1; }
    60%  { transform:translate(-50%,-50%) scale(0.9) rotate(-2deg); opacity:1; }
    80%  { transform:translate(-50%,-50%) scale(1.08) rotate(1deg); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:0; }
  }

  /* ── Mystery bubble ── */
  .mystery-bubble {
    position:absolute; border-radius:50%;
    pointer-events:all; cursor:pointer; z-index:11;
    will-change:transform,opacity;
    animation: bubbleSpawn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards,
               mysteryPulse 1.4s ease-in-out 0.4s infinite;
  }
  @keyframes mysteryPulse {
    0%,100% { box-shadow: 0 0 20px #ff00ff88, 0 0 50px #ff00ff33, inset 0 0 20px rgba(255,255,255,0.3); }
    50%     { box-shadow: 0 0 40px #ff00ffcc, 0 0 80px #ff00ff66, inset 0 0 30px rgba(255,255,255,0.5); }
  }

  /* ── Rocket ── */
  #rocket {
    position:fixed; pointer-events:none; z-index:60;
    font-size:clamp(44px,12vw,72px); line-height:1;
    will-change:transform; filter:drop-shadow(0 0 12px rgba(255,150,50,0.6));
  }
  .rocket-flame {
    position:fixed; pointer-events:none; z-index:59;
    border-radius:50%; will-change:transform,opacity;
  }
  @keyframes flamePuff {
    0%   { transform:translate(-50%,-50%) scale(0.3); opacity:0.9; }
    100% { transform:translate(-50%,-50%) scale(1.4); opacity:0; }
  }

  /* ── Rainbow arc ── */
  #rainbow {
    position:fixed; pointer-events:none; z-index:3;
    will-change:opacity;
  }
  @keyframes rainbowFade {
    0%   { opacity:0; }
    15%  { opacity:0.55; }
    75%  { opacity:0.45; }
    100% { opacity:0; }
  }
</style>
</head>
<body>

<div id="bg"></div>
<div id="milestone-flash"></div>
<canvas id="stars"></canvas>
<div id="color-echo"></div>
<div id="stage"></div>

<div id="header">
  <div id="score-badge">
    <span id="score-icon">🫧</span>
    <span id="score-label">Bubbles Popped&nbsp;</span>
    <span id="score-number">0</span>
  </div>
</div>

<script>
(function() {
  'use strict';

  const WORDS        = ['Mama','Papa','Rui','Roxy','Rio','Kitty','Moo','Hoot Hoot','Baa Baa','Bubble','Hi!','Hey!'];
  const EMOJIS       = ['✨','💥','🎈','⭐','🌟','🎉','🌈','💫','🎊','🐴','🐑','🐶','🐱','🦉','🐮','🦋','🌸','🍭'];
  const FACES        = ['😊','😄','🥰','😜','🤩','😁','🥳','🌝'];

  // Iridescent bubble color palettes — vivid and glassy
  const BUBBLE_COLORS = [
    // [inner-light, outer-rich, border-glow]
    ['rgba(255,180,220,0.55)','rgba(220,60,140,0.70)','#ff5eb8'],
    ['rgba(160,220,255,0.55)','rgba(40,140,255,0.70)','#38b6ff'],
    ['rgba(180,255,200,0.55)','rgba(20,200,100,0.70)','#22dd88'],
    ['rgba(255,240,140,0.55)','rgba(255,180,0,0.70)','#ffcc00'],
    ['rgba(220,160,255,0.55)','rgba(160,40,255,0.70)','#c040ff'],
    ['rgba(120,240,230,0.55)','rgba(0,200,200,0.70)','#00ddd0'],
    ['rgba(255,200,160,0.55)','rgba(255,110,20,0.70)','#ff7820'],
    ['rgba(200,200,255,0.55)','rgba(80,80,255,0.70)','#7070ff'],
  ];

  // Bright neon word colors
  const WORD_COLORS = ['#ff4dd2','#ff9500','#00d4ff','#00ff99','#bf00ff','#ff003c','#ffee00','#00aaff'];

  const SWIPE_WORD_INTERVAL_PX = 120;
  const PARTICLE_COUNT         = 12;
  const MAX_BUBBLES            = 60;
  const MILESTONES             = new Set([10,25,50,100,200]);

  const stage          = document.getElementById('stage');
  const scoreEl        = document.getElementById('score-number');
  const activeElements = new Set();
  let   bubbleCount    = 0;
  let   popScore       = 0;

  // ── Score ──
  function incrementScore() {
    popScore++;
    scoreEl.textContent = popScore;
    scoreEl.classList.remove('bump');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('bump');
    if (MILESTONES.has(popScore)) triggerMilestone(popScore);
  }

  // ── Audio ──
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playPop(x) {
    try {
      const ctx = getAudioCtx(), now = ctx.currentTime;
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
      osc.connect(gain);
      if (pan) { gain.connect(pan); pan.connect(ctx.destination); pan.pan.value = (x / window.innerWidth) * 2 - 1; }
      else gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(480 + Math.random() * 240, now);
      osc.frequency.exponentialRampToValueAtTime(160, now + 0.13);
      gain.gain.setValueAtTime(0.32, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now); osc.stop(now + 0.16);
    } catch(e) {}
  }

  function playSpawn() {
    try {
      const ctx = getAudioCtx(), now = ctx.currentTime;
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(280, now);
      osc.frequency.exponentialRampToValueAtTime(520, now + 0.09);

  const ANIMAL_SOUNDS = { '🦉':playOwl, '🐮':playCow, '🐴':playHorse, '🐱':playCat };

  // ── Garbage Collection ──
  function destroyElement(el) {
    if (!el) return;
    clearTimeout(el._gcTimer);
    clearTimeout(el._switchTimer);
    if (el.parentNode) el.parentNode.removeChild(el);
    activeElements.delete(el);

  // ── Bubble Factory ──
  function spawnBubble(x, y, forcedSize) {
    if (bubbleCount >= MAX_BUBBLES) return;

    const colorSet      = BUBBLE_COLORS[Math.floor(Math.random() * BUBBLE_COLORS.length)];
    const size          = forcedSize !== undefined ? forcedSize : 48 + Math.random() * 88;
    const el            = document.createElement('div');
    el.className        = 'bubble';
    const floatDuration = 8000 + Math.random() * 7000;
    const wobbleFreq    = 0.5 + Math.random() * 0.9;
    const wobbleAmp     = 18 + Math.random() * 32;
    const originX       = x - size / 2;
    const originY       = y - size / 2;
    const totalRise     = window.innerHeight * 1.3;
    let   popped        = false;
    let   rafId         = null;

    el.dataset.echoColor = colorSet[2];

    // Glassy bubble: semi-transparent fill + strong border glow + outer glow
    el.style.cssText = `
      width:${size}px; height:${size}px;
      left:${originX}px; top:${originY}px;
      background: radial-gradient(circle at 32% 28%, ${colorSet[0]}, ${colorSet[1]});
      border: 2px solid ${colorSet[2]};
      box-shadow:
        inset 0 0 ${size*0.25}px rgba(255,255,255,0.35),
        0 0 ${size*0.35}px ${colorSet[2]}66,
        0 0 ${size*0.6}px ${colorSet[2]}22;
      opacity:0;
      animation: bubbleSpawn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
    `;

    function doPopBubble(cx, cy) {
      if (popped) return;
      popped = true;
      if (rafId) cancelAnimationFrame(rafId);
      clearTimeout(el._gcTimer);
      playPop(cx);
      spawnParticles(cx, cy, colorSet[2]);
      incrementScore();
      if (el.dataset.echoColor) triggerColorEcho(el.dataset.echoColor);
      checkChainReaction(cx, cy);
      el.style.animation = 'bubblePop 0.2s ease-out forwards';
      setTimeout(() => { destroyElement(el); bubbleCount = Math.max(0,bubbleCount-1); }, 220);
    }

    el.addEventListener('popme', function(e) { doPopBubble(e.detail.cx, e.detail.cy); });

    stage.appendChild(el);
    activeElements.add(el);
    bubbleCount++;
    playSpawn();

    // 28% chance of emoji face
    if (Math.random() < 0.28) {
      const face = document.createElement('span');
      face.textContent = FACES[Math.floor(Math.random() * FACES.length)];
      face.style.cssText = `position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:${Math.round(size*0.5)}px;line-height:1;pointer-events:none;`;
      el.appendChild(face);
    }

    // Touchstart/mousedown direct pop
    el.addEventListener('touchstart', function(e) {
      e.stopPropagation();
      const t = e.changedTouches[0];
      doPopBubble(t.clientX, t.clientY);
    }, { passive:false });
    el.addEventListener('mousedown', function(e) {
      e.stopPropagation();
      doPopBubble(e.clientX, e.clientY);
    });

    setTimeout(function startFloat() {
      if (popped || !el.parentNode) return;
      const floatStart = performance.now();
      function tick(now) {
        if (popped || !el.parentNode) return;
        const elapsed  = now - floatStart;
        const progress = Math.min(elapsed / floatDuration, 1);
        const currentY = originY - totalRise * progress;
        const wobbleX  = originX + Math.sin(elapsed * 0.001 * wobbleFreq * Math.PI * 2) * wobbleAmp;
        const opacity  = progress > 0.75 ? Math.max(0, 1-(progress-0.75)/0.25) : 1;
        el.style.top     = currentY + 'px';
        el.style.left    = wobbleX  + 'px';
        el.style.opacity = opacity;
        if (progress >= 1) { destroyElement(el); bubbleCount = Math.max(0,bubbleCount-1); return; }
        rafId = requestAnimationFrame(tick);
      }
      rafId = requestAnimationFrame(tick);
    }, 320);

    el._gcTimer = setTimeout(() => {
      if (!popped) { destroyElement(el); bubbleCount = Math.max(0,bubbleCount-1); }
    }, floatDuration + 1500);
  }

  // ── Chain Reaction ──
  const CHAIN_RADIUS = 115;
  function checkChainReaction(cx, cy) {
    stage.querySelectorAll('.bubble').forEach(n => {
      const nx = parseFloat(n.style.left) + parseFloat(n.style.width)  / 2;
      const ny = parseFloat(n.style.top)  + parseFloat(n.style.height) / 2;
      const dist = Math.hypot(nx-cx, ny-cy);
      if (dist < CHAIN_RADIUS && dist > 0) {
        setTimeout(() => n.dispatchEvent(new CustomEvent('popme',{detail:{cx:nx,cy:ny}})), 160 + dist * 0.9);
      }
    });
  }

  // ── Particles — vivid, more of them ──
  function spawnParticles(cx, cy, glowColor) {
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const angle    = (i / PARTICLE_COUNT) * Math.PI * 2 + (Math.random()-0.5) * 0.8;

      const dx       = Math.cos(angle) * dist;
      const dy       = Math.sin(angle) * dist;
      const rotFull  = (Math.random()-0.5) * 720;
      const rotHalf  = rotFull * 0.5;
      const emoji    = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];

      el.textContent = emoji;
      el.style.cssText = `
        left:${cx}px; top:${cy}px;
        --dx:${dx}px; --dy:${dy}px;
        --rot:${rotFull}deg; --rot-half:${rotHalf}deg;
        animation: particleBurst ${burstDur}s cubic-bezier(0.15,0.85,0.35,1) forwards;
      `;
      stage.appendChild(el);

      const sw = setTimeout(() => {
        if (!el.parentNode) return;
        el.style.animation = `particleFade ${fadeDur}s ease-out forwards`;
        el._gcTimer = setTimeout(() => destroyElement(el), fadeDur*1000+60);
      }, burstDur*1000);
      el._switchTimer = sw;
      el._gcTimer = setTimeout(() => destroyElement(el), (burstDur+fadeDur)*1000+200);
    }
  }

  // ── Word Labels — glow halo style ──
  function spawnWord(x, y) {

  // ── Milestone ──
  function triggerMilestone(score) {
    const labels  = {10:'🎉 10!',25:'⭐ 25!',50:'🏆 50!',100:'💥 100!!',200:'🌟 200!!!'};
    const colors  = {10:'rgba(255,200,100',25:'rgba(100,220,255',50:'rgba(255,100,220',100:'rgba(255,80,80',200:'rgba(200,100,255'};

  // ── Input Handling ──
  const swipeTracks = new Map();

  function bubbleAtPoint(x, y, target) {
    let el = target;
    while (el && el !== document) {
      if (el.classList && el.classList.contains('bubble')) return el;
      el = el.parentElement;
    }
    return null;
  }

  document.addEventListener('touchstart', function(e) {
    e.preventDefault();
    getAudioCtx();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      const target = t.target || document.elementFromPoint(t.clientX, t.clientY);
      // Bubbles handle their own touchstart — just track swipe
      if (!bubbleAtPoint(t.clientX, t.clientY, target)) {
        swipeTracks.set(t.identifier, { lastWordX:t.clientX, lastWordY:t.clientY });
        spawnBubble(t.clientX, t.clientY);
      }
    }
  }, { passive:false });

  document.addEventListener('touchmove', function(e) {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      spawnTrailDot(t.clientX, t.clientY);
      const track = swipeTracks.get(t.identifier);
      if (!track) continue;
      const dx = t.clientX - track.lastWordX;
      const dy = t.clientY - track.lastWordY;
      if (Math.sqrt(dx*dx+dy*dy) >= SWIPE_WORD_INTERVAL_PX) {
        spawnWord(t.clientX, t.clientY);
        track.lastWordX = t.clientX; track.lastWordY = t.clientY;
      }
    }
  }, { passive:false });

  document.addEventListener('touchend', function(e) {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) swipeTracks.delete(e.changedTouches[i].identifier);
  }, { passive:false });

  let mouseDown = false, mouseTrack = { lastWordX:0, lastWordY:0 };
  document.addEventListener('mousedown', e => {
    getAudioCtx();
    if (bubbleAtPoint(e.clientX, e.clientY, e.target)) return;
    mouseDown = true;
    mouseTrack = { lastWordX:e.clientX, lastWordY:e.clientY };
    spawnBubble(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    spawnTrailDot(e.clientX, e.clientY);
    const dx = e.clientX - mouseTrack.lastWordX, dy = e.clientY - mouseTrack.lastWordY;
    if (Math.sqrt(dx*dx+dy*dy) >= SWIPE_WORD_INTERVAL_PX) {
      spawnWord(e.clientX, e.clientY);
      mouseTrack.lastWordX = e.clientX; mouseTrack.lastWordY = e.clientY;
    }
  });
  document.addEventListener('mouseup', () => mouseDown = false);

  document.addEventListener('gesturestart',  e => e.preventDefault(), { passive:false });
  document.addEventListener('gesturechange', e => e.preventDefault(), { passive:false });
  document.addEventListener('gestureend',    e => e.preventDefault(), { passive:false });
  document.addEventListener('contextmenu',   e => e.preventDefault());
  document.addEventListener('selectstart',   e => e.preventDefault());
  document.addEventListener('dragstart',     e => e.preventDefault());
  let lastTap = 0;
  document.addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive:false });

  ];

  function buildCloudSVG(shapeIdx) {
    const puffs = CLOUD_SHAPES[shapeIdx];
    const pad = 80;
    const minX = Math.min(...puffs.map((p,i)=>p.ox-p.rx)) - pad;
    const maxX = Math.max(...puffs.map((p,i)=>p.ox+p.rx)) + pad;
    const minY = Math.min(...puffs.map((p,i)=>p.oy-p.ry)) - pad;
    const maxY = Math.max(...puffs.map((p,i)=>p.oy+p.ry)) + pad;
    const w = maxX-minX, h = maxY-minY, cx = -minX, cy = -minY;
    // Layered fills for depth
    const ellipses = puffs.map(p =>
      `<ellipse cx="${cx+p.ox}" cy="${cy+p.oy}" rx="${p.rx}" ry="${p.ry}"
        fill="url(#cg${p.rx})" opacity="0.85"/>`
    ).join('');
    const defs = `<defs>
      <radialGradient id="cg${puffs[0].rx}" cx="40%" cy="35%" r="60%">
        <stop offset="0%" stop-color="rgba(240,248,255,0.82)"/>
        <stop offset="100%" stop-color="rgba(180,210,255,0.25)"/>
      </radialGradient>
      ${puffs.slice(1).map(p=>`<radialGradient id="cg${p.rx}" cx="40%" cy="35%" r="60%">
        <stop offset="0%" stop-color="rgba(230,242,255,0.72)"/>
        <stop offset="100%" stop-color="rgba(160,200,255,0.18)"/>
      </radialGradient>`).join('')}
    </defs>`;
    return { svg:`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${defs}${ellipses}</svg>`, w, h };
  }

  function spawnCloud() {
    const shapeIdx = Math.floor(Math.random() * CLOUD_SHAPES.length);
    const scale    = 0.75 + Math.random() * 0.85;
    const { svg, w, h } = buildCloudSVG(shapeIdx);
    const el     = document.createElement('div');
    el.className = 'cloud';
    const cw = w*scale, ch = h*scale;
    const startX = -cw-20;
    const y      = window.innerHeight*(0.07 + Math.random()*0.44);
    const speed  = 26 + Math.random() * 24;
    const endX   = window.innerWidth + cw + 20;

    el.style.cssText = `left:${startX}px; top:${y}px; width:${cw}px; height:${ch}px;`;
    el.innerHTML = svg;
    el.querySelector('svg').style.cssText = 'width:100%;height:100%;';

    function onCloudTap(e) {
      e.stopPropagation();
      if (e.changedTouches) {
        for (let i = 0; i < e.changedTouches.length; i++) {
          const id = e.changedTouches[i].identifier;
          if (window._holdBubbles && window._holdBubbles.has(id)) {
            const s = window._holdBubbles.get(id);
            cancelAnimationFrame(s.raf);
            s.el.parentNode && s.el.parentNode.removeChild(s.el);
            window._holdBubbles.delete(id);
          }
        }
      }
      cancelAnimationFrame(el._raf);
      const rect = el.getBoundingClientRect();
      const ccx  = rect.left + rect.width/2;
      const ccy  = rect.top  + rect.height/2;
      CLOUD_SHAPES[shapeIdx].forEach((p,i) => {
        const pEl = document.createElement('div');
        pEl.className = 'cloud-puff';
        const ps    = (p.rx+p.ry)*scale*0.95;
        const angle = (i/CLOUD_SHAPES[shapeIdx].length)*Math.PI*2 + Math.random()*0.5;
        const dist  = 65 + Math.random()*90;
        const px    = Math.cos(angle)*dist, py = Math.sin(angle)*dist;
        const dur   = 0.5 + Math.random()*0.35;
        pEl.style.cssText = `
          left:${ccx+p.ox*scale-ps/2}px; top:${ccy+p.oy*scale-ps/2}px;
          width:${ps}px; height:${ps}px;
          --px:${px}px; --py:${py}px;
          animation: cloudPuffOut ${dur}s ease-out forwards;
        `;
        document.body.appendChild(pEl);
        setTimeout(() => pEl.parentNode && pEl.parentNode.removeChild(pEl), dur*1000+50);
      });
      el.parentNode && el.parentNode.removeChild(el);
    }
    el.addEventListener('touchstart', onCloudTap, { passive:false });
    el.addEventListener('mousedown',  onCloudTap);
    document.body.appendChild(el);

    const startTime = performance.now();
    function drift(now) {
      const x = startX + (now-startTime)/1000 * speed;
      el.style.left = x + 'px';
      if (x < endX && el.parentNode) el._raf = requestAnimationFrame(drift);
      else el.parentNode && el.parentNode.removeChild(el);
    }
    el._raf = requestAnimationFrame(drift);
  }

  // ── Tap & Hold — Grow Bubble ──
  (function initHoldBubble() {
    const HOLD_MAX_SIZE  = 170;
    const HOLD_MIN_SIZE  = 20;
    const HOLD_GROW_RATE = 85;
    const holds = new Map();
    window._holdBubbles = holds;

    function isCloudTarget(el) {
      let node = el;
      while (node && node !== document.body) {
        if (node.classList && node.classList.contains('cloud')) return true;
        node = node.parentNode;
      }
      return false;
    }

    function startHold(id, x, y) {
      const el = document.createElement('div');
      el.className = 'hold-bubble';
      const ci = Math.floor(Math.random() * BUBBLE_COLORS.length);
      const cs = BUBBLE_COLORS[ci];
      const applyStyle = s => {
        const idx = Math.min(Math.floor(s / HOLD_MAX_SIZE * BUBBLE_COLORS.length), BUBBLE_COLORS.length-1);
        const c   = BUBBLE_COLORS[idx];
        el.style.cssText = `
          left:${x}px; top:${y}px; width:${s}px; height:${s}px;
          background: radial-gradient(circle at 32% 28%, ${c[0]}, ${c[1]});
          border: 2px solid ${c[2]};
          box-shadow: inset 0 0 ${s*0.25}px rgba(255,255,255,0.4),
                      0 0 ${s*0.4}px ${c[2]}88, 0 0 ${s*0.7}px ${c[2]}22;
          opacity:${0.45 + (s/HOLD_MAX_SIZE)*0.55};
          transform:translate(-50%,-50%);
        `;
      };
      applyStyle(HOLD_MIN_SIZE);
      document.body.appendChild(el);

      const state = { el, x, y, size:HOLD_MIN_SIZE, startTime:performance.now() };
      holds.set(id, state);

      function grow(now) {
        if (!holds.has(id)) return;
        const elapsed = (now - state.startTime) / 1000;
        state.size = Math.min(HOLD_MIN_SIZE + elapsed * HOLD_GROW_RATE, HOLD_MAX_SIZE);
        applyStyle(state.size);
        if (state.size < HOLD_MAX_SIZE) state.raf = requestAnimationFrame(grow);
      }
      state.raf = requestAnimationFrame(grow);
    }

    function releaseHold(id) {
      const s = holds.get(id);
      if (!s) return;
      holds.delete(id);
      cancelAnimationFrame(s.raf);
      s.el.parentNode && s.el.parentNode.removeChild(s.el);
      if (s.size > HOLD_MIN_SIZE + 6) spawnBubble(s.x, s.y, s.size);
    }

    document.addEventListener('touchstart', function(e) {
      for (let i = 0; i < e.changedTouches.length; i++) {
        const t = e.changedTouches[i];
        const target = t.target || document.elementFromPoint(t.clientX, t.clientY);
        if (isCloudTarget(target)) continue;
        if (!bubbleAtPoint(t.clientX, t.clientY, target)) startHold(t.identifier, t.clientX, t.clientY);
      }
    }, { passive:false, capture:true });

    document.addEventListener('touchmove', function(e) {
      for (let i = 0; i < e.changedTouches.length; i++) {
        const t = e.changedTouches[i];
        const s = holds.get(t.identifier);
        if (s) {
          const dx = t.clientX-s.x, dy = t.clientY-s.y;
          if (Math.sqrt(dx*dx+dy*dy) > 14) {
            cancelAnimationFrame(s.raf);
            s.el.parentNode && s.el.parentNode.removeChild(s.el);
            holds.delete(t.identifier);
          }
        }
      }
    }, { passive:false, capture:true });

    document.addEventListener('touchend', function(e) {
      for (let i = 0; i < e.changedTouches.length; i++) releaseHold(e.changedTouches[i].identifier);
    }, { passive:false, capture:true });

    let mouseHolding = false;
    document.addEventListener('mousedown', function(e) {
      if (isCloudTarget(e.target)) return;
      if (!bubbleAtPoint(e.clientX, e.clientY, e.target)) {
        mouseHolding = true; startHold('mouse', e.clientX, e.clientY);
      }
    }, { capture:true });
    document.addEventListener('mousemove', function(e) {
      if (!mouseHolding) return;
      const s = holds.get('mouse');
      if (s) {
        const dx = e.clientX-s.x, dy = e.clientY-s.y;
        if (Math.sqrt(dx*dx+dy*dy) > 14) {
          cancelAnimationFrame(s.raf);
          s.el.parentNode && s.el.parentNode.removeChild(s.el);
          holds.delete('mouse'); mouseHolding = false;
        }
      }
    }, { capture:true });
    document.addEventListener('mouseup', function() {
      if (mouseHolding) { releaseHold('mouse'); mouseHolding = false; }
    }, { capture:true });
  })();

    el.addEventListener('touchstart', function(e) { e.stopPropagation(); const t=e.changedTouches[0]; doGiantPop(t.clientX,t.clientY); }, { passive:false });
    el.addEventListener('mousedown',  function(e) { e.stopPropagation(); doGiantPop(e.clientX,e.clientY); });

    stage.appendChild(el);
    bubbleCount++;

    setTimeout(() => {
      if (popped || !el.parentNode) return;
      const floatStart = performance.now();
      function tick(now) {
        if (popped || !el.parentNode) return;
        const elapsed  = now - floatStart;
        const progress = Math.min(elapsed / floatDur, 1);
        el.style.top     = (originY - window.innerHeight*1.3*progress) + 'px';
        el.style.left    = (originX + Math.sin(elapsed*0.001*wobbleFreq*Math.PI*2)*wobbleAmp) + 'px';
        el.style.opacity = progress > 0.75 ? Math.max(0,1-(progress-0.75)/0.25) : 1;
        if (progress >= 1) { destroyElement(el); bubbleCount=Math.max(0,bubbleCount-1); return; }
        rafId = requestAnimationFrame(tick);
      }
      rafId = requestAnimationFrame(tick);
    }, 480);

    el._gcTimer = setTimeout(() => { if (!popped) { destroyElement(el); bubbleCount=Math.max(0,bubbleCount-1); } }, floatDur + 1500);
  }

  setTimeout(function giantLoop() {
    spawnGiantBubble();
    setTimeout(giantLoop, 70000 + Math.random() * 30000);
  }, 35000);

  // ── Rocket ── (flies across every 60s)
  let rocketActive = false;
  function spawnRocket() {
    if (rocketActive) return;
    rocketActive = true;
    const el    = document.createElement('div');
    el.id       = 'rocket';
    const fromRight = Math.random() > 0.5;
    const y     = 80 + Math.random() * window.innerHeight * 0.45;
    const startX = fromRight ? window.innerWidth + 80 : -80;
    const endX   = fromRight ? -120 : window.innerWidth + 120;
    const dir    = fromRight ? -1 : 1;
    const speed  = 200 + Math.random() * 150; // px/s
    const duration = (window.innerWidth + 200) / speed * 1000;

    el.textContent = fromRight ? '🚀' : '🚀';
    el.style.cssText = `left:${startX}px; top:${y}px; transform:scaleX(${dir});`;
    document.body.appendChild(el);

    // Flame trail
    const flameInterval = setInterval(() => {
      if (!el.parentNode) { clearInterval(flameInterval); return; }
      const rect = el.getBoundingClientRect();
      const fx   = rect.left + rect.width * 0.5;
      const fy   = rect.top  + rect.height * 0.6;
      const flame = document.createElement('div');
      flame.className = 'rocket-flame';
      const fs = 8 + Math.random() * 14;
      flame.style.cssText = `
        left:${fx}px; top:${fy}px; width:${fs}px; height:${fs}px;
        background:radial-gradient(circle, rgba(255,200,50,0.9), rgba(255,80,0,0.5));
        --sx:${(Math.random()-0.5)*20}px; --sy:${10+Math.random()*20}px;
        animation: flamePuff 0.4s ease-out forwards;
      `;
      document.body.appendChild(flame);
      setTimeout(() => flame.parentNode && flame.parentNode.removeChild(flame), 450);
    }, 60);

    const startTime = performance.now();
    function fly(now) {
      const elapsed = now - startTime;
      const x = startX + dir * -1 * (elapsed / 1000) * speed;
      el.style.left = x + 'px';
      if (elapsed < duration && el.parentNode) requestAnimationFrame(fly);
      else {
        clearInterval(flameInterval);
        el.parentNode && el.parentNode.removeChild(el);
        rocketActive = false;
      }
    }
    requestAnimationFrame(fly);

    // Whoosh sound
    try {
      const ctx = getAudioCtx(), now = ctx.currentTime;
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.8, ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/d.length*3);
      const src = ctx.createBufferSource(), g = ctx.createGain();
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 0.8;
      src.buffer = buf; src.connect(filt); filt.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.8);
      src.start(now); src.stop(now+0.85);
    } catch(e) {}
  }

  setTimeout(function rocketLoop() {
    spawnRocket();
    setTimeout(rocketLoop, 55000 + Math.random() * 25000);
  }, 18000);

  // ── Rainbow Arc ── (appears every 90s, lasts 12s)
  function spawnRainbow() {
    const W = window.innerWidth, H = window.innerHeight;
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.id = 'rainbow';
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('width', W); svg.setAttribute('height', H);
    svg.style.cssText = 'left:0;top:0;opacity:0;';

    const cx = W * 0.5, cy = H * 0.78;
    const radii = [W*0.52, W*0.47, W*0.42, W*0.37, W*0.32, W*0.27, W*0.22];
    const colors = ['#ff0000','#ff8800','#ffee00','#00cc44','#0099ff','#6633ff','#cc00ff'];
    const widths = [18, 17, 16, 15, 14, 13, 12];

    radii.forEach((r, i) => {
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      const x1 = cx - r, x2 = cx + r;
      path.setAttribute('d', `M ${x1} ${cy} A ${r} ${r} 0 0 1 ${x2} ${cy}`);
      path.setAttribute('stroke', colors[i]);
      path.setAttribute('stroke-width', widths[i]);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-opacity', '0.65');
      path.setAttribute('stroke-linecap', 'round');
      svg.appendChild(path);
    });

    document.body.appendChild(svg);
    svg.style.animation = 'rainbowFade 12s ease-in-out forwards';
    setTimeout(() => svg.parentNode && svg.parentNode.removeChild(svg), 12500);
  }

  setTimeout(function rainbowLoop() {
    spawnRainbow();
    setTimeout(rainbowLoop, 85000 + Math.random() * 30000);
  }, 50000);

  // ── Ambient Space Music ── (very soft, looping)
  function startAmbientMusic() {
    try {
      const ctx = getAudioCtx();
      const masterGain = ctx.createGain();
      masterGain.gain.value = 0.04; // very quiet
      masterGain.connect(ctx.destination);

      // Slow pad — layered sine drones
      const notes = [65.4, 98.0, 130.8, 196.0]; // C2 G2 C3 G3
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const g    = ctx.createGain();
        osc.connect(g); g.connect(masterGain);
        osc.type = 'sine';
        osc.frequency.value = freq * (1 + i * 0.0008); // micro-detune for richness
        g.gain.value = 0.3 / (i + 1);
        osc.start();
      });

      // Twinkling high notes — random pentatonic plinks
      const pentatonic = [523, 659, 784, 1047, 1175, 1319];
      function twinkle() {
        try {
          const osc = ctx.createOscillator(), g = ctx.createGain();
          osc.connect(g); g.connect(masterGain);
          osc.type = 'sine';
          osc.frequency.value = pentatonic[Math.floor(Math.random() * pentatonic.length)];
          const now = ctx.currentTime;
          g.gain.setValueAtTime(0, now);
          g.gain.linearRampToValueAtTime(1.8, now + 0.04);
          g.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
          osc.start(now); osc.stop(now + 1.3);
        } catch(e) {}
        setTimeout(twinkle, 2500 + Math.random() * 5000);
      }
      setTimeout(twinkle, 3000);

    } catch(e) {}
  }

  // Start music on first touch (after audio context unlocked)
  let musicStarted = false;
  document.addEventListener('touchstart', function initMusic() {
    if (musicStarted) return;
    musicStarted = true;
    startAmbientMusic();
  }, { passive: true, once: true });
  document.addEventListener('mousedown', function initMusicMouse() {
    if (musicStarted) return;
    musicStarted = true;
    startAmbientMusic();
  }, { once: true });

  // ── Shooting Stars ──
  function spawnShootingStarBurst() {
    const count = 4 + Math.floor(Math.random()*4);
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el      = document.createElement('div');
        el.className  = 'shooting-star';
        const startY  = 36 + Math.random() * window.innerHeight * 0.34;
        const tailLen = 55 + Math.random() * 110;
        const starSize = 3 + Math.random() * 3.5;
        const dur     = 0.75 + Math.random() * 0.65;
        const travelX = window.innerWidth + tailLen + 40;

        el.style.cssText = `
          left:${-(tailLen+starSize)}px; top:${startY}px;
          width:${starSize}px; height:${starSize}px;
          background:#ffe94d;
          box-shadow:0 0 ${starSize*2.5}px ${starSize*2}px rgba(255,233,80,1),
                     0 0 ${starSize*7}px rgba(255,200,0,0.85);
          --sx:${travelX}px; --sy:0px;
          animation: shootingStar ${dur}s linear forwards;
          opacity:1;
        `;
        const tail = document.createElement('div');
        tail.style.cssText = `
          position:absolute; top:50%; right:${starSize}px;
          transform:translateY(-50%);
          width:${tailLen}px; height:${Math.max(2,starSize*0.6)}px;
          border-radius:999px;
          background:linear-gradient(to right, rgba(255,233,80,0), rgba(255,233,80,0.95));
          pointer-events:none;
        `;
        el.appendChild(tail);
        document.body.appendChild(el);
        setTimeout(() => el.parentNode && el.parentNode.removeChild(el), dur*1000+100);
      }, i*260);
    }
  }
  setTimeout(function ssLoop() {
    spawnShootingStarBurst();
    setTimeout(ssLoop, 20000);
  }, 20000);

  // ── Idle Ambient Bubbles ──
  let idleTimer = null;
  let ambientInterval = null;
  let ambientCount    = 0;

  function resetIdle() {
    clearTimeout(idleTimer);
    clearInterval(ambientInterval);
    ambientCount = 0;
    idleTimer = setTimeout(startAmbient, 2500);
  }

  function startAmbient() {
    ambientInterval = setInterval(() => {
      if (ambientCount >= 10) return;
      const x = Math.random() * window.innerWidth;
      const y = window.innerHeight * 0.65 + Math.random() * window.innerHeight * 0.35;
      spawnBubble(x, y);
      ambientCount++;
    }, 1200 + Math.random() * 2000);
  }

  document.addEventListener('touchstart', resetIdle, { passive:true });
  document.addEventListener('mousedown',  resetIdle);
  resetIdle();

  // ── Starfield ──
  (function initStars() {
    const canvas = document.getElementById('stars');
    const ctx    = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    function makeStars(count) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x:       Math.random() * W,
          y:       Math.random() * H,
          r:       0.4 + Math.random() * 1.7,
          opacity: 0.25 + Math.random() * 0.75,
          speed:   0.25 + Math.random() * 0.9,
          phase:   Math.random() * Math.PI * 2,
          hue:     Math.random() > 0.85 ? (Math.random() > 0.5 ? 200 : 270) : 0,
        });
      }
    }
    function drawStars(ts) {
      ctx.clearRect(0, 0, W, H);
      const t = ts * 0.001;
      for (const s of stars) {
        const alpha = s.opacity * (0.55 + 0.45 * Math.sin(t * s.speed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        // Slight blue/purple tint on some stars
        ctx.fillStyle = s.hue > 0
          ? `hsla(${s.hue},70%,85%,${alpha.toFixed(3)})`
          : `rgba(255,255,255,${alpha.toFixed(3)})`;
        ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }
    resize();
    makeStars(200);
    window.addEventListener('resize', () => { resize(); makeStars(200); });
    requestAnimationFrame(drawStars);
  })();

  // ── Sleeping Moon ──
  let moonEl     = null;
  let moonActive = false;
  let moonTimer  = null;
  let moonZzzTimer = null;

  function showMoon() {
    if (moonActive) return;
    moonActive = true;
    moonEl = document.createElement('div');
    moonEl.id = 'moon';
    moonEl.textContent = '🌙';
    const side = Math.random() > 0.5 ? 'left' : 'right';
    const y    = window.innerHeight * (0.25 + Math.random()*0.5);
    moonEl.style.cssText = `
      top:${y}px; ${side}:${20+Math.random()*60}px;
      animation: moonAppear 0.6s cubic-bezier(0.34,1.3,0.64,1) forwards,
                 moonDrift 4s ease-in-out 0.6s infinite;
    `;
    function scareMoon(e) {
      e.stopPropagation();
      if (!moonActive) return;
      moonActive = false;
      clearInterval(moonZzzTimer);
      document.querySelectorAll('.moon-zzz').forEach(z => z.parentNode && z.parentNode.removeChild(z));
      moonEl.style.animation = 'moonFlee 0.4s ease-in forwards';
      try {
        const ctx = getAudioCtx(), now = ctx.currentTime;
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400,now);
        osc.frequency.exponentialRampToValueAtTime(1200,now+0.12);
        osc.frequency.exponentialRampToValueAtTime(200,now+0.3);
        gain.gain.setValueAtTime(0.2,now);
        gain.gain.exponentialRampToValueAtTime(0.001,now+0.35);
        osc.start(now); osc.stop(now+0.4);
      } catch(e2) {}
      setTimeout(() => moonEl && moonEl.parentNode && moonEl.parentNode.removeChild(moonEl), 450);
      scheduleMoon();
    }
    moonEl.addEventListener('touchstart', scareMoon, { passive:false });
    moonEl.addEventListener('mousedown',  scareMoon);
    document.body.appendChild(moonEl);

    moonZzzTimer = setInterval(() => {
      if (!moonActive) return;
      const z   = document.createElement('div');
      z.className = 'moon-zzz';
      z.textContent = ['z','zz','zzz'][Math.floor(Math.random()*3)];
      const rect = moonEl.getBoundingClientRect();
      const zx = (Math.random()-0.3)*50, zy = -(30+Math.random()*40);
      z.style.cssText = `
        left:${rect.left+rect.width*0.6}px; top:${rect.top+rect.height*0.1}px;
        --zx:${zx}px; --zy:${zy}px; animation:zzzFloat 1.4s ease-out forwards;
      `;
      document.body.appendChild(z);
      setTimeout(() => z.parentNode && z.parentNode.removeChild(z), 1500);
    }, 900);
  }

  function hideMoon() {
    if (!moonActive || !moonEl) return;
    moonActive = false;
    clearInterval(moonZzzTimer);
    document.querySelectorAll('.moon-zzz').forEach(z => z.parentNode && z.parentNode.removeChild(z));
    moonEl.style.animation = 'moonFlee 0.4s ease-in forwards';
    setTimeout(() => moonEl && moonEl.parentNode && moonEl.parentNode.removeChild(moonEl), 450);
  }

  function scheduleMoon() {
    clearTimeout(moonTimer);
    moonTimer = setTimeout(showMoon, 14000 + Math.random()*6000);
  }
  scheduleMoon();

  document.addEventListener('touchstart', function() { if (moonActive) hideMoon(); scheduleMoon(); }, { passive:true });
  document.addEventListener('mousedown',  function() { if (moonActive) hideMoon(); scheduleMoon(); });

  // ── Peeking Animals ──
  const PEEK_ANIMALS  = ['🦉','🐮','🐴','🐱'];
  const ANIMAL_WORDS  = { '🦉':'HOOT HOOT!', '🐮':'MOO!', '🐴':'NEIGH!', '🐱':'MEOW!' };

  function spawnPeekAnimal() {
    const animal   = PEEK_ANIMALS[Math.floor(Math.random() * PEEK_ANIMALS.length)];
    const edge     = ['bottom','left','right'][Math.floor(Math.random()*3)];
    const el       = document.createElement('div');
    el.className   = 'peek-animal';
    el.textContent = animal;
    const W = window.innerWidth, H = window.innerHeight;
    const dur = 3.5;

    if (edge === 'bottom') {
      el.style.left   = (20 + Math.random()*(W-160)) + 'px';
      el.style.bottom = '0px';
      el.style.animation = `peekBottom ${dur}s cubic-bezier(0.34,1.2,0.64,1) forwards`;
    } else if (edge === 'left') {
      el.style.left = '0px';
      el.style.top  = (80 + Math.random()*(H-240)) + 'px';
      el.style.animation = `peekLeft ${dur}s cubic-bezier(0.34,1.2,0.64,1) forwards`;
    } else {
      el.style.right = '0px';
      el.style.top   = (80 + Math.random()*(H-240)) + 'px';
      el.style.animation = `peekRight ${dur}s cubic-bezier(0.34,1.2,0.64,1) forwards`;
    }

    el.style.pointerEvents = 'all';
    el.style.cursor        = 'pointer';

    function onPeekTap(e) {
      e.stopPropagation();
      const rect = el.getBoundingClientRect();
      const cx   = rect.left + rect.width/2;
      const cy   = rect.top  + rect.height/2;

      for (let i = 0; i < 12; i++) {
        const angle    = (i/12)*Math.PI*2 + (Math.random()-0.5)*0.5;
        const dist     = 80 + Math.random()*145;
        const dx       = Math.cos(angle)*dist, dy = Math.sin(angle)*dist;
        const rot      = (Math.random()-0.5)*540;
        const burstDur = 0.28 + Math.random()*0.1;
        const fadeDur  = 1.0  + Math.random()*0.5;
        const pEl      = document.createElement('div');
        pEl.className  = 'emoji-particle';
        pEl.textContent = animal;
        pEl.style.fontSize = 'clamp(28px,7.5vw,50px)';
        pEl.style.cssText += `left:${cx}px;top:${cy}px;--dx:${dx}px;--dy:${dy}px;--rot:${rot}deg;--rot-half:${rot*0.5}deg;animation:particleBurst ${burstDur}s cubic-bezier(0.2,0.8,0.4,1) forwards;`;
        document.body.appendChild(pEl);
        const sw = setTimeout(() => {
          if (!pEl.parentNode) return;
          pEl.style.animation = `particleFade ${fadeDur}s ease-out forwards`;
          pEl._gcTimer = setTimeout(() => pEl.parentNode && pEl.parentNode.removeChild(pEl), fadeDur*1000+60);
        }, burstDur*1000);
        pEl._switchTimer = sw;
        setTimeout(() => pEl.parentNode && pEl.parentNode.removeChild(pEl), (burstDur+fadeDur)*1000+200);
      }

      // Sound word — appended LAST so it paints above everything
      const word  = ANIMAL_WORDS[animal] || '!';
      const color = WORD_COLORS[Math.floor(Math.random()*WORD_COLORS.length)];
      const tilt  = (Math.random()-0.5)*15;
      const wEl   = document.createElement('div');
      wEl.className   = 'word-label';
      wEl.textContent = word;
      wEl.style.cssText = `
        left:${cx}px; top:${cy-60}px; color:${color};
        --tilt:${tilt}deg;
        font-size:clamp(32px,9.5vw,62px);
        z-index:500;
        text-shadow:0 0 18px ${color}, 0 0 40px ${color}99, 0 2px 0 rgba(0,0,0,0.4);
        animation:wordPop 0.36s cubic-bezier(0.34,1.56,0.64,1) forwards;
      `;
      document.body.appendChild(wEl);
      playWordPop();
      setTimeout(() => {
        if (!wEl.parentNode) return;
        wEl.style.animation = 'wordFade 0.65s ease-out forwards';
        setTimeout(() => wEl.parentNode && wEl.parentNode.removeChild(wEl), 700);
      }, 1200);

      el.style.transition = 'transform 0.18s cubic-bezier(0.34,1.56,0.64,1)';
      const cur = el.style.transform || '';
      el.style.transform = cur.replace(/scale\([^)]+\)/,'') + ' scale(1.45)';
      setTimeout(() => { el.style.transform = cur; }, 200);
    }
    el.addEventListener('touchstart', onPeekTap, { passive:false });
    el.addEventListener('mousedown',  onPeekTap);
    document.body.appendChild(el);
    setTimeout(() => el.parentNode && el.parentNode.removeChild(el), dur*1000+100);
  }

  setTimeout(function peekLoop() {
    spawnPeekAnimal();
    setTimeout(peekLoop, 10000);
  }, 10000);

})();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Rui-Bubble-Pop/sw.js').catch(() => {});
  });
}
